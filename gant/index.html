<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor de Degradados</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212;
    color:white;
    padding:12px;
}

.card{
    background:#1e1e1e;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
}

h1{
    font-size:1.4rem;
    text-align:center;
    margin-bottom:10px;
}

h2{
    font-size:1.1rem;
    margin-bottom:10px;
}

.resumen{
    display:flex;
    justify-content:space-around;
    text-align:center;
}

.contador{
    padding:8px;
}

.numero{
    font-size:1.4rem;
    font-weight:bold;
}

.pendientes{
    color:#aaaaaa;
}

.iniciadas{
    color:#f1c40f;
}

.completadas{
    color:#2ecc71;
}

.item{
    background:#252525;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
}

.estado-pendiente{
    border-left:6px solid #666;
}

.estado-iniciado{
    border-left:6px solid #f1c40f;
}

.estado-completado{
    border-left:6px solid #2ecc71;
}

.titulo{
    font-weight:bold;
    font-size:1rem;
    margin-bottom:6px;
}

.meta{
    color:#c0c0c0;
    font-size:0.9rem;
    margin-bottom:3px;
}

.estado{
    margin-top:8px;
    font-weight:bold;
}

button{
    border:none;
    border-radius:8px;
    padding:10px;
    cursor:pointer;
    margin-top:8px;
    width:100%;
    font-weight:bold;
}

.btn-iniciar{
    background:#f1c40f;
    color:black;
}

.btn-completar{
    background:#2ecc71;
    color:white;
}

.btn-cerrar{
    background:#3498db;
    color:white;
}

.btn-reset{
    background:#e74c3c;
    color:white;
}

.panel-vacio{
    color:#999;
    text-align:center;
    padding:10px;
}

.aviso{
    background:#332200;
    border-left:6px solid #f1c40f;
}

@media (max-width:600px){

    .resumen{
        flex-direction:row;
    }

    .titulo{
        font-size:0.95rem;
    }

}

</style>

</head>

<body>

<div class="card">
    <h1>DEGRADADO ACTIVO</h1>

    <div class="resumen">

        <div class="contador">
            <div class="numero pendientes" id="pendientes">0</div>
            <div>Pendientes</div>
        </div>

        <div class="contador">
            <div class="numero iniciadas" id="iniciadas">0</div>
            <div>En curso</div>
        </div>

        <div class="contador">
            <div class="numero completadas" id="completadas">0</div>
            <div>Completadas</div>
        </div>

    </div>
</div>

<div class="card">
    <h2>🟡 TAREAS EN CURSO</h2>

    <div id="panelCurso"></div>
</div>

<div class="card">
    <h2>📋 TODAS LAS TAREAS</h2>

    <div id="listaTareas"></div>
</div>

<div class="card aviso">
    <button class="btn-cerrar" onclick="cerrarDegradado()">
        CERRAR DEGRADADO
    </button>
</div>

<div class="card">
    <button class="btn-reset" onclick="reiniciar()">
        REINICIAR PROCEDIMIENTO
    </button>
</div>

<script>

const tareasIniciales = [

{
id:1,
tarea:"Ver situación inicial de planta",
responsable:"Líder Línea Pasajero",
duracion:"10 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:2,
tarea:"Escalado a responsable de producción y plant manager",
responsable:"Técnico Producción",
duracion:"10 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:3,
tarea:"Escalado a equipo IT, LJS, LFG y LPS",
responsable:"Técnico IT",
duracion:"1 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:4,
tarea:"Reunir al equipo para iniciar el degradado",
responsable:"Técnico Producción",
duracion:"10 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:5,
tarea:"Detener líneas y manutención de entrada al almacén",
responsable:"Técnico Producción",
duracion:"5 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:6,
tarea:"Imprimir 3 copias del listado degradado EMON",
responsable:"Líder Línea Pasajero",
duracion:"5 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:7,
tarea:"Igualar líneas R1 y R2 y calcular prioridad 0",
responsable:"Técnico Producción",
duracion:"5 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:8,
tarea:"Identificar asientos conductor con número EMON",
responsable:"Operario R1",
duracion:"1 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:9,
tarea:"Identificar kits R2 con número EMON",
responsable:"Operario R2",
duracion:"1 min",
estado:"pendiente",
inicio:null,
fin:null
},

{
id:10,
tarea:"Desactivar control visión y configurar R2",
responsable:"Líder R2 / Mantenimiento",
duracion:"5 min",
estado:"pendiente",
inicio:null,
fin:null
}

];

let tareas =
JSON.parse(localStorage.getItem("degradado")) ||
tareasIniciales;

function guardar(){

    localStorage.setItem(
        "degradado",
        JSON.stringify(tareas)
    );
}

function horaActual(){

    return new Date().toLocaleTimeString();
}

function iniciarTarea(id){

    const tarea =
    tareas.find(t => t.id === id);

    tarea.estado = "iniciado";
    tarea.inicio = horaActual();

    guardar();
    render();
}

function completarTarea(id){

    const tarea =
    tareas.find(t => t.id === id);

    tarea.estado = "completado";
    tarea.fin = horaActual();

    guardar();
    render();
}

function render(){

    const pendientes =
    tareas.filter(t => t.estado === "pendiente").length;

    const iniciadas =
    tareas.filter(t => t.estado === "iniciado").length;

    const completadas =
    tareas.filter(t => t.estado === "completado").length;

    document.getElementById("pendientes").innerText =
    pendientes;

    document.getElementById("iniciadas").innerText =
    iniciadas;

    document.getElementById("completadas").innerText =
    completadas;

    renderPanelCurso();

    renderLista();
}

function renderPanelCurso(){

    const panel =
    document.getElementById("panelCurso");

    const abiertas =
    tareas.filter(
        t => t.estado === "iniciado"
    );

    if(abiertas.length === 0){

        panel.innerHTML =
        '<div class="panel-vacio">No hay tareas abiertas</div>';

        return;
    }

    panel.innerHTML =
    abiertas.map(t => `

        <div class="item estado-iniciado">

            <div class="titulo">
                ${t.tarea}
            </div>

            <div class="meta">
                Responsable: ${t.responsable}
            </div>

            <div class="meta">
                Inicio: ${t.inicio}
            </div>

        </div>

    `).join("");

}

function renderLista(){

    const lista =
    document.getElementById("listaTareas");

    lista.innerHTML =
    tareas.map(t => {

        let clase = "";

        let textoEstado = "";

        let botones = "";

        if(t.estado === "pendiente"){

            clase = "estado-pendiente";
            textoEstado = "⚪ Pendiente";

            botones =
            `<button class="btn-iniciar"
                onclick="iniciarTarea(${t.id})">
                INICIAR
            </button>`;
        }

        if(t.estado === "iniciado"){

            clase = "estado-iniciado";
            textoEstado = "🟡 En curso";

            botones =
            `<button class="btn-completar"
                onclick="completarTarea(${t.id})">
                COMPLETAR
            </button>`;
        }

        if(t.estado === "completado"){

            clase = "estado-completado";
            textoEstado = "✅ Completado";
        }

        return `

        <div class="item ${clase}">

            <div class="titulo">
            ${t.id}. ${t.tarea}
            </div>

            <div class="meta">
            Responsable: ${t.responsable}
            </div>

            <div class="meta">
            Duración estimada: ${t.duracion}
            </div>

            ${t.inicio ?
            `<div class="meta">
            Inicio: ${t.inicio}
            </div>` : ""}

            ${t.fin ?
            `<div class="meta">
            Fin: ${t.fin}
            </div>` : ""}

            <div class="estado">
            ${textoEstado}
            </div>

            ${botones}

        </div>
        `;

    }).join("");

}

function cerrarDegradado(){

    const abiertas =
    tareas.filter(
        t => t.estado === "iniciado"
    );

    if(abiertas.length > 0){

        let mensaje =
        "ATENCIÓN\n\n";

        mensaje +=
        "Existen tareas iniciadas sin completar:\n\n";

        abiertas.forEach(t => {
            mensaje +=
            "- " + t.tarea + "\n";
        });

        alert(mensaje);

        return;
    }

    const pendientes =
    tareas.filter(
        t => t.estado === "pendiente"
    );

    if(pendientes.length > 0){

        if(!confirm(
            "Quedan tareas pendientes. ¿Desea cerrar igualmente?"
        )){
            return;
        }
    }

    alert(
        "✅ Degradado cerrado correctamente"
    );

}

function reiniciar(){

    if(!confirm(
        "¿Seguro que desea reiniciar el procedimiento?"
    )){
        return;
    }

    localStorage.removeItem("degradado");

    tareas =
    JSON.parse(JSON.stringify(tareasIniciales));

    render();
}

render();

</script>

</body>
</html>
